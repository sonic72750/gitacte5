name: Auto Api Super

on:
  workflow_dispatch:

  schedule:
    - cron: "0 1,5,8 * * 1-5"

  release:
    types:
      - published

  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: auto-api-super
  cancel-in-progress: true

jobs:
  run-api-check:
    name: Test Microsoft Graph API
    runs-on: ubuntu-latest

    # 防止網路或程式異常造成工作無限執行。
    timeout-minutes: 15

    env:
      PYTHONUNBUFFERED: "1"

      ID_LIST: ${{ secrets.ID_LIST }}
      KEY_LIST: ${{ secrets.KEY_LIST }}

      ID_LIST2: ${{ secrets.ID_LIST2 }}
      KEY_LIST2: ${{ secrets.KEY_LIST2 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "requests>=2.32,<3"

      - name: Validate required files
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f "testapi.py" ]]; then
            echo "::error::找不到 testapi.py"
            exit 1
          fi

          if [[ ! -d "token" ]]; then
            echo "::error::找不到 token 目錄"
            exit 1
          fi

          echo "找到以下 Token 檔案："
          find token -maxdepth 1 -type f -name "*.txt" \
            -printf "%f\n" | sort

      - name: Run Microsoft Graph API checks
        run: |
          python -u testapi.py
